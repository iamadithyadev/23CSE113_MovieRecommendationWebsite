<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieVault - Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="appShell">
    <nav class="topnav">
      <div class="topnav-inner">
        <span class="nav-logo" onclick="location.href='home.html'"><span>Movie</span>Vault</span>
        <form class="nav-search-wrap" onsubmit="event.preventDefault(); searchMovie();">
          <input id="searchInput" class="nav-search-input" placeholder="Search movies...">
          <button type="submit" class="nav-search-btn">Go</button>
        </form>
        <div class="nav-links">
          <button class="nav-link-btn" onclick="location.href='home.html'">Home</button>
          <button class="nav-link-btn" onclick="location.href='genres.html'">Genres</button>
          <button class="nav-link-btn" onclick="location.href='favourites.html'">Fav</button>
          <button class="nav-link-btn" onclick="location.href='contact.html'">Contact</button>
          <button class="nav-link-btn" onclick="location.href='about.html'">About</button>
          <button id="adminNavBtn" class="nav-link-btn admin-btn" style="display:none;" onclick="location.href='admin.html'">Admin</button>
          <button class="nav-exit-btn" onclick="logout()">Logout</button>
        </div>
      </div>
    </nav>
    <div id="mainContent"></div>
    <footer class="site-footer">
      <div class="container">
        <div class="footer-main">
          <div><span class="nav-logo" style="font-size:28px;"><span style="color:var(--red);">Movie</span>Vault</span><p style="color:var(--gray); font-size:12px; margin-top:10px;">Indian Cinema Discovery Platform</p></div>
          <div><h4 style="color:var(--gray); font-size:11px; margin-bottom:14px;">NAVIGATE</h4><a class="footer-link" onclick="location.href='home.html'">Home</a><a class="footer-link" onclick="location.href='genres.html'">Genres</a><a class="footer-link" onclick="location.href='favourites.html'">Favorites</a></div>
          <div><h4 style="color:var(--gray); font-size:11px; margin-bottom:14px;">CINEMA</h4><span class="footer-link">Bollywood</span><span class="footer-link">Tollywood</span><span class="footer-link">Kollywood</span><span class="footer-link">Mollywood</span></div>
        </div>
        <div class="footer-bottom"><p>© 2025 MovieVault · Made with ❤️</p><p>Powered by TMDb API</p></div>
      </div>
    </footer>
  </div>
  <div id="movieModal" class="vanilla-modal">
    <div class="vanilla-modal-content">
      <div class="vanilla-modal-header"><button class="vanilla-modal-close" onclick="closeModal()">&times;</button></div>
      <div class="vanilla-modal-body" id="modalBody"><div class="loader"></div></div>
    </div>
  </div>
  <script src="script.js"></script>
  <script>
    window.onload = function() {
      const user = JSON.parse(localStorage.getItem("currentUser"));
      if (!user) { location.href = "login.html"; return; }
      if (user.role === "admin") document.getElementById("adminNavBtn").style.display = "inline-block";
      showHome();
    };
  </script>
</body>
</html>

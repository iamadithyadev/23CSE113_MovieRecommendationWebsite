<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieVault - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="appShell">
    <nav class="topnav">...</nav>
    <div id="mainContent"></div>
    <footer class="site-footer">...</footer>
  </div>
  <div id="movieModal" class="vanilla-modal">...</div>
  <!-- Admin modal is inside showAdminPanel() content -->
  <script src="script.js"></script>
  <script>
    window.onload = function() {
      const user = JSON.parse(localStorage.getItem("currentUser"));
      if (!user || user.role !== "admin") { window.location.href = "home.html"; return; }
      showAdminPanel(); // this will populate mainContent with the admin toggles
    };
  </script>
</body>
</html>

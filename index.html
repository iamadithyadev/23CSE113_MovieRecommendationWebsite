<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieVault - Indian Cinema</title>
<!-- Bootstrap CSS (only framework used) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=sw
<link rel="stylesheet" href="style.css">
</head>
<body>
which 
<!-- LOGIN PAGE (full screen) -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-logo"><span>Movie</span>Vault</div>
    <div class="login-tagline">INDIAN CINEMA HUB</div>
    <div class="tab-row">
      <button id="tabL" class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button id="tabS" class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <div id="divLogin">
      <form onsubmit="event.preventDefault(); doLogin();">
        <input id="lUser" class="form-control-custom" type="text" placeholder="Username">
        <input id="lPass" class="form-control-custom" type="password" placeholder="Password">
        <button type="submit" class="btn-red">Sign In</button>
      </form>
    </div>
    <div id="divSignup" style="display:none;">
      <form onsubmit="event.preventDefault(); doSignup();">
        <input id="sUser" class="form-control-custom" type="text" placeholder="Username">
        <input id="sPass" class="form-control-custom" type="password" placeholder="Password (4+ chars)">
        <button type="submit" class="btn-red">Create Account</button>
      </form>
    </div>
  </div>
</div>


<!-- MAIN APP (hidden until logged in) -->
<div id="appShell">
  <nav class="topnav">
    <div class="topnav-inner">
      <span class="nav-logo" onclick="showHome()"><span>Movie</span>Vault</span>
      <form class="nav-search-wrap" onsubmit="event.preventDefault(); searchMovie();">
        <input id="searchInput" class="nav-search-input" placeholder="Search movies...">
        <button type="submit" class="nav-search-btn">Go</button>
      </form>
      <div class="nav-links">
        <button class="nav-link-btn" onclick="showHome()">Home</button>
        <button class="nav-link-btn" onclick="showGenres()">Genres</button>
        <button class="nav-link-btn" onclick="showFav()">Fav</button>
        <button class="nav-link-btn" onclick="showContact()">Contact</button>
        <button class="nav-link-btn" onclick="showAbout()">About</button>
        <button id="adminNavBtn" class="nav-link-btn admin-btn" style="display:none;" onclick="showAdminPanel(
        <button class="nav-exit-btn" onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>
  <div id="mainContent"></div>
  <footer class="site-footer">
    <div class="container">
      <div class="footer-main">
        <div><span class="nav-logo" style="font-size:28px;"><span style="color:var(--red);">Movie</span>Vault<
        <div><h4 style="color:var(--gray); font-size:11px; margin-bottom:14px;">NAVIGATE</h4><a class="footer-
        <div><h4 style="color:var(--gray); font-size:11px; margin-bottom:14px;">CINEMA</h4>
          <span class="footer-link">Bollywood</span>
          <span class="footer-link">Tollywood</span>
          <span class="footer-link">Kollywood</span>
          <span class="footer-link">Mollywood</span>
        </div>
      </div>
      <div class="footer-bottom"><p>© 2025 MovieVault · Made with ❤️</p><p>Powered by TMDb API</p></div>
    </div>
  </footer>
</div>


<!-- ADMIN MODAL -->
<div class="modal fade" id="adminModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Admin Panel</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="form-check form-switch mb-3">
          <input class="form-check-input" type="checkbox" id="toggleTrending" checked>
          <label class="form-check-label" for="toggleTrending">🔥 Show Trending Section</label>
        </div>
        <div class="form-check form-switch mb-3">
          <input class="form-check-input" type="checkbox" id="toggleTopRated" checked>
          <label class="form-check-label" for="toggleTopRated">⭐ Show Top Rated Section</label>
        </div>
        <div class="form-check form-switch mb-3">
          <input class="form-check-input" type="checkbox" id="toggleUpcoming" checked>
          <label class="form-check-label" for="toggleUpcoming">📅 Show Upcoming Section</label>
        </div>
        <button class="btn-red w-100" onclick="applyAdminSettings()">Apply & Refresh Home</button>
      </div>
    </div>
  </div>
</div>


<!-- MOVIE DETAIL MODAL (vanilla JS controlled) -->
<div id="movieModal" class="vanilla-modal">
  <div class="vanilla-modal-content">
    <div class="vanilla-modal-header">
      <button class="vanilla-modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="vanilla-modal-body" id="modalBody"><div class="loader"></div></div>
  </div>
</div>


<script src="script.js"></script>
</body>
</html>
